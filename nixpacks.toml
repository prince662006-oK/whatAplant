# nixpacks.toml — WhatAPlant Railway
[phases.setup]
nixPkgs = [
    "php83",
    "php83Extensions.pdo",
    "php83Extensions.pdo_mysql",
    "php83Extensions.gd",
    "php83Extensions.curl",
    "php83Extensions.mbstring",
    "php83Extensions.fileinfo",
    "php83Extensions.json",
    "php83Extensions.zip",
    "php83Extensions.intl"
]

[phases.build]
cmds = [
    "mkdir -p uploads icons",
    "chmod 755 uploads"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t . router.php"
cmd = "php -S 0.0.0.0:$PORT -t . router.php"
